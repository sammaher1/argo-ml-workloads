apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-inference
  labels:
    app.kubernetes.io/name: ml-inference
    app.kubernetes.io/part-of: argo-ml-workloads
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ml-inference
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ml-inference
        app.kubernetes.io/part-of: argo-ml-workloads
    spec:
      containers:
        - name: api
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/server.py
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: MODEL_NAME
              value: toy-churn-risk
            - name: MODEL_VERSION
              value: base
            - name: ENVIRONMENT
              value: base
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: ml-inference-script

