apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ml-inference.fullname" . }}
  labels:
    {{- include "ml-inference.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ml-inference.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ml-inference.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: argo-ml-workloads
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python
            - /app/server.py
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: MODEL_NAME
              value: {{ .Values.model.name | quote }}
            - name: MODEL_VERSION
              value: {{ .Values.model.version | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: {{ include "ml-inference.fullname" . }}-script

