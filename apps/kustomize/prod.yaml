apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ml-inference-kustomize-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sammaher1/argo-ml-workloads.git
    targetRevision: main
    path: workloads/kustomize/overlays/prod
  destination:
    name: prod
    namespace: ml-lab
  syncPolicy:
    syncOptions:
      - CreateNamespace=true

