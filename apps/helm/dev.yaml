apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ml-inference-helm-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sammaher1/argo-ml-workloads.git
    targetRevision: main
    path: workloads/helm/ml-inference
    helm:
      releaseName: ml-inference
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ml-lab
  syncPolicy:
    syncOptions:
      - CreateNamespace=true

