apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ml-inference-rollout
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_GITHUB_USER/argo-ml-workloads.git
    targetRevision: main
    path: workloads/rollouts
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: ml-lab-rollout
  syncPolicy:
    syncOptions:
      - CreateNamespace=true

